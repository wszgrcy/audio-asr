name: Build All

on:
    push:
    workflow_dispatch:

permissions:
    contents: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ghcr.io/${{github.actor}}/audio-server

jobs:
    check-version:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Check if new version
              id: check
              run: |
                  VERSION=$(jq -r '.version' package.json)
                  echo "version: $VERSION"

                  # Check if tag exists
                  if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
                    echo "Tag $VERSION already exists, not a new version"
                    echo "is-new-version=false" >> $GITHUB_OUTPUT
                  else
                    echo "Tag $VERSION does not exist, new version"
                    echo "is-new-version=true" >> $GITHUB_OUTPUT
                  fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
        outputs:
            is-new-version: ${{ steps.check.outputs.is-new-version }}
            version: ${{ steps.check.outputs.version }}
    build-windows:
        needs: check-version
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            - name: install-pnpm
              uses: pnpm/action-setup@v5
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  cache: "pnpm"
                  node-version-file: ".nvmrc"

            - name: Install dependencies
              run: pnpm install

            - name: Build desktop application
              run: npm run electron:build
              working-directory: desktop

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              if: needs.check-version.outputs.is-new-version == 'true'
              with:
                  tag_name: ${{ needs.check-version.outputs.version }}
                  name: ${{ needs.check-version.outputs.version }}
                  files: desktop/dist/output/audio-asr-${{needs.check-version.outputs.version}}-win.zip
                  draft: false
                  prerelease: false

    build-android:
        needs: check-version
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: install-pnpm
              uses: pnpm/action-setup@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  cache: "pnpm"
                  node-version-file: ".nvmrc"

            - name: Setup Java
              uses: actions/setup-java@v5
              with:
                  distribution: "zulu"
                  java-version: "21"

            - name: Setup Android SDK
              uses: android-actions/setup-android@v4
              with:
                  cmdline-tools-version: 14742923
                  packages: "build-tools;36.0.0 tools platform-tools"
            - name: Add build-tools to $PATH
              run: echo "$ANDROID_HOME/build-tools/36.0.0" >> "$GITHUB_PATH"
            - name: Install dependencies
              run: pnpm install

            - name: Initialize plugin
              run: npm run build
              working-directory: cap-audio-capture
            - name: Initialize Android platform
              run: npm run init:android
              working-directory: mobile

            - name: Build mobile application
              run: npm run build:android
              working-directory: mobile

            - name: Generate capacitor assets
              run: npx capacitor-assets generate --android
              working-directory: mobile

            - name: Decode and restore JKS keystore
              run: |
                  echo "${{ secrets.JKS }}" | base64 -d > mobile/android/keystore.jks

            - name: Build Android APK
              run: |
                  pnpm npx cap build android \
                    --keystorepath keystore.jks \
                    --keystorepass ${{ secrets.ANDROID_KEYSTORE_PASS }} \
                    --keystorealias ${{ secrets.ANDROID_KEYSTORE_ALIAS }} \
                    --keystorealiaspass ${{ secrets.ANDROID_KEYSTORE_ALIAS_PASS }} \
                    --androidreleasetype APK \
                    --signing-type apksigner
              working-directory: mobile

            - name: Rename APK file
              run: |
                  mv android/app/build/outputs/apk/release/app-release-signed.apk android/app/build/outputs/apk/release/audio-asr-${{ needs.check-version.outputs.version }}.apk
              working-directory: mobile

            - name: Cleanup keystore file
              run: rm -f mobile/android/keystore.jks

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              if: needs.check-version.outputs.is-new-version == 'true'
              with:
                  tag_name: ${{ needs.check-version.outputs.version }}
                  name: ${{ needs.check-version.outputs.version }}
                  files: mobile/android/app/build/outputs/apk/release/audio-asr-${{needs.check-version.outputs.version}}.apk
                  draft: false
                  prerelease: false

    build-server:
        needs: check-version
        runs-on: ubuntu-latest

        steps:

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{env.IMAGE_NAME}}
                  tags: |
                      type=raw,value=${{ needs.check-version.outputs.version}}

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              if: needs.check-version.outputs.is-new-version == 'true'
              with:
                  context: .
                  file: ./docker/build/server/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
