@if (info(); as info) {
  <div class="flex flex-col">
    @let value = info.type === 'end' ? 100 : (info.value ?? 0);

    <progress
      [class]="'progress w-full' | mergeClass: progressClass$$()"
      [value]="value"
      max="100"
    ></progress>

    <div>
      @switch (info.type) {
        @case ('error') {
          ❌
        }
        @case ('end') {
          ✔️
        }
      }
      {{ info.message }}
    </div>
  </div>
}
