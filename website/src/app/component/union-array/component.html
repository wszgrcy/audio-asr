<ng-template #templateRef let-attr="attributes" let-events="events">
  @if (addPosition() === 'top') {
    <div class="flex items-center gap-2">
      <ng-container
        [selectlessOutlet]="PiyingView"
        [selectlessOutletInputs]="schemaOptions$$()"
        [selectlessOutletOutputs]="modelOutput | pure: newValue$"
      ></ng-container>
    </div>
  }
  <div
    [class]="wrapperClass$$() | cssPrefix | mergeClass: attr()?.class"
    [attributes]="attr()"
    [excludes]="['class']"
    [events]="events()"
  >
    @for (field of children$$(); track field.id || $index) {
      <div class="flex items-center gap-2">
        @let key = field.key!;
        @if (showKey()) {
          <span> {{ key }}</span>
        }
        <div class="flex-1">
          <ng-container
            *ngTemplateOutlet="
              fieldTemplateRef;
              context: { $implicit: field, injector }
            "
          ></ng-container>
        </div>
        @if (!disableRemove()) {
          <button class="btn btn-circle btn-error" (click)="removeItem(key)">
            <mat-icon>delete</mat-icon>
          </button>
        }
      </div>
    }
    @if (addPosition() === 'bottom') {
      <div class="flex items-center gap-2">
        <ng-container
          [selectlessOutlet]="PiyingView"
          [selectlessOutletInputs]="schemaOptions$$()"
          [selectlessOutletOutputs]="modelOutput | pure: newValue$"
        ></ng-container>
      </div>
    }
  </div>
</ng-template>
